version: "3.9"

services:
  qa-code-agent:
    build: .
    image: qa-code-agent:local
    env_file:
      - .env
    environment:
      # Fallbacks seguros (podem ser sobrescritos no .env)
      BITBUCKET_BRANCH: ${BITBUCKET_BRANCH:-main}
    volumes:
      - ./outputs:/app/outputs
      - ./configs:/app/configs:ro
    command: >
      python scripts/run_analysis.py
      --repo ${BITBUCKET_REPO_SLUG}
      --branch ${BITBUCKET_BRANCH:-main}
    restart: on-failure
